services:
  postgres:
    image: postgres:16-alpine
    container_name: sentineldesk-postgres
    environment:
      POSTGRES_DB: sentineldesk
      POSTGRES_USER: sentineldesk
      POSTGRES_PASSWORD: sentineldesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sentineldesk-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: sentineldesk-backend
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      ENABLE_SEEDING: "true"
      ALLOW_DETERMINISTIC_SEED_CREDENTIALS: "true"
      ALLOW_DEFAULT_SEED_PASSWORD_LOGIN: "true"
      CHANNEL_SECRET_PREPAID_BALANCE: dev-prepaid-channel-secret
      CHANNEL_SECRET_INVOICE_CREDIT: dev-invoice-channel-secret
      CHANNEL_SECRET_PURCHASE_ORDER_SETTLEMENT: dev-po-channel-secret
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    container_name: sentineldesk-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
